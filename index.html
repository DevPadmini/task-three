<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #141414, #340461);
    }

    .calculator {
      width: 320px;
      background: #222;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    #display {
      width: 100%;
      height: 70px;
      border: none;
      outline: none;
      border-radius: 10px;
      font-size: 2rem;
      text-align: right;
      padding: 10px;
      margin-bottom: 15px;
      background: #fff;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 60px;
      border: none;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .number {
      background: #f1f1f1;
    }

    .operator {
      background: orange;
      color: white;
    }

    .equal {
      background: #28a745;
      color: white;
    }

    .clear {
      background: #dc3545;
      color: white;
    }

    .preview {
      color: #fff;
      text-align: right;
      margin-bottom: 10px;
      min-height: 20px;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <input type="text" id="display" readonly>
    <div class="preview" id="preview"></div>

    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button onclick="backspace()">⌫</button>
      <button class="operator" onclick="append('/')">/</button>
      <button class="operator" onclick="append('*')">×</button>

      <button class="number" onclick="append('7')">7</button>
      <button class="number" onclick="append('8')">8</button>
      <button class="number" onclick="append('9')">9</button>
      <button class="operator" onclick="append('-')">−</button>

      <button class="number" onclick="append('4')">4</button>
      <button class="number" onclick="append('5')">5</button>
      <button class="number" onclick="append('6')">6</button>
      <button class="operator" onclick="append('+')">+</button>

      <button class="number" onclick="append('1')">1</button>
      <button class="number" onclick="append('2')">2</button>
      <button class="number" onclick="append('3')">3</button>
      <button class="equal" onclick="calculate()">=</button>

      <button class="number" style="grid-column: span 2;" onclick="append('0')">0</button>
      <button class="number" onclick="append('.')">.</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");
    const preview = document.getElementById("preview");

    function append(value) {
      display.value += value;
      showPreview();
    }

    function clearDisplay() {
      display.value = "";
      preview.textContent = "";
    }

    function backspace() {
      display.value = display.value.slice(0, -1);
      showPreview();
    }

    function calculate() {
      try {
        display.value = eval(display.value);
        preview.textContent = "";
      } catch {
        display.value = "Error";
      }
    }

    function showPreview() {
      try {
        if (display.value !== "") {
          preview.textContent = "= " + eval(display.value);
        } else {
          preview.textContent = "";
        }
      } catch {
        preview.textContent = "";
      }
    }

    // Keyboard Support
    document.addEventListener("keydown", (e) => {
      const key = e.key;

      if (
        (key >= "0" && key <= "9") ||
        ["+", "-", "*", "/", "."].includes(key)
      ) {
        append(key);
      }

      if (key === "Enter") {
        calculate();
      }

      if (key === "Backspace") {
        backspace();
      }

      if (key === "Escape") {
        clearDisplay();
      }
    });
  </script>

</body>
</html>
